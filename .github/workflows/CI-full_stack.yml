name: CI Execution des tests Back + Front + envois à SonarCloud

on:
  
  pull_request:
    branches:
      - main


jobs:
  Executions_tests_backend: # 1er sous job executé sur une MV1

    runs-on: ubuntu-latest
    steps:
      # 1. Récupérer le code source du repository
      - name: Récupérer le code source du repository
        uses: actions/checkout@v4

      # 2. Installer Java pour Maven (Java 17)
      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Exécuter tests backend + générer Jacoco
      - name: Exécuter tests backend + générer Jacoco
        run: mvn clean verify
        working-directory: back

      # 4. Téléchargement du rapport Jacoco (pour le donner à Sonar plus tard)
      - name: Téléchargement du rapport Jacoco
        uses: actions/upload-artifact@v4
        with:
          name: telechargement-rapport-jacoco
          path: back/target/site/jacoco/jacoco.xml


  Executions_tests_frontend: # 2em sous job executé en parallèle sur une MV2

    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source du repository
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer dépendances frontend
        run: npm ci  # plus optimisé que npm install pour le CI CD
        working-directory: front

      - name: Exécuter tests frontend avec coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless # car l'execution des tests en CI est sans interface graphique du navigateur, et sans ça ça peut causer une erreur.
        working-directory: front

      # Téléchargement du rapport Coverage (pour le donner à Sonar plus tard)
      - name: Téléchargement du rapport Coverage
        uses: actions/upload-artifact@v4
        with:
          name: telechargement-rapport-coverage
          path: front/coverage/bobapp/lcov.info


  Envois_vers_SonarCloud:

    runs-on: ubuntu-latest
    needs:
      - Executions_tests_backend
      - Executions_tests_frontend

    steps:
      - name: Récupérer le code source du repository
        uses: actions/checkout@v4

      - name: Installer Java 17 (compatible SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compiler backend pour Sonar
        run: mvn clean verify
        working-directory: back
      
      
      - name: Récupération du rapport Jacoco téléchargé
        uses: actions/download-artifact@v4
        with:
          name: telechargement-rapport-jacoco
          path: back/target/site/jacoco

      - name: Récupération du rapport Coverage téléchargé
        uses: actions/download-artifact@v4
        with:
          name: telechargement-rapport-coverage
          path: front/coverage/bobapp
        
          
      - name: Execution de sonar-scanner à la racine du projet pour analyser le front et le back
        run: npx sonar-scanner
       
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      
      - name: Vérification du Quality Gate de SonarCloud
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}



  Creation_images_docker_et_push_vers_dockerHub:

    runs-on: ubuntu-latest
    needs: Envois_vers_SonarCloud

    steps:
      - name: Récupérer le code source  # pour recuperer les 2 DockerFiles
        uses: actions/checkout@v4 

      - name: Connection à DockerHub
        run: echo "${{ secrets.TOKEN_DOCKERHUB_AVEC_WRITE }}" | docker login -u "${{ secrets.USERNAME_DOCKERHUB }}" --password-stdin

      # Envois du front
      - name: Build de l'image Docker  # construction de l'image docker à partir du DockerFile
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/bobapp-front ./front

      - name: Push de l'image sur DockerHub   # envois de l'image sur DockerHub
        run: docker push ${{ secrets.USERNAME_DOCKERHUB }}/bobapp-front

      # Envois du back
      - name: Build image Docker BACK
        run: docker build -t ${{ secrets.USERNAME_DOCKERHUB }}/bobapp-back ./back

      - name: Push image Docker BACK
        run: docker push ${{ secrets.USERNAME_DOCKERHUB }}/bobapp-back


      