name: CI Execution des tests Back + Front + envois à SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Executions_tests_backend:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupérer le code source du repository
      - name: Récupérer le code source du repository
        uses: actions/checkout@v4

      # 2. Installer Java pour Maven (Java 17)
      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Exécuter tests backend + générer Jacoco
      - name: Exécuter tests backend + générer Jacoco
        run: mvn clean verify
        working-directory: back


  Executions_tests_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source du repository
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer dépendances frontend
        run: npm ci  # plus optimisé que npm install pour le CI CD
        working-directory: front

      - name: Exécuter tests frontend avec coverage
        run: npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
        working-directory: front

      